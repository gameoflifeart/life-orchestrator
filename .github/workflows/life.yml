name: Game of Life Contributions

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: {}

jobs:
  update-life-frame:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out orchestrator repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Game of Life updater
        env:
          ACCESS_TOKEN: ${{ secrets.LIFE_ACCESS_TOKEN }}
          TARGET_REPO: ${{ vars.TARGET_REPO }}
          DEFAULT_BRANCH: ${{ vars.DEFAULT_BRANCH }}
          AUTHOR_NAME: ${{ vars.AUTHOR_NAME }}
          AUTHOR_EMAIL: ${{ vars.AUTHOR_EMAIL }}
        run: python main.py

      - name: Commit updated state
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          AUTHOR_NAME: ${{ vars.AUTHOR_NAME }}
          AUTHOR_EMAIL: ${{ vars.AUTHOR_EMAIL }}
        run: |
          git config user.name "${AUTHOR_NAME}"
          git config user.email "${AUTHOR_EMAIL}"
          if git status --porcelain -- state.json | grep -q .; then
            git add state.json
            git commit -m "Update Life state"
            git push
          else
            echo "No state changes to commit."
          fi

